<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pixel Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg2:    #12121a;
      --bg3:    #1a1a26;
      --border: #2a2a3d;
      --accent: #f5c842;
      --text:   #e8e8f0;
      --text2:  #9898b0;
      --pixel:  'Press Start 2P', monospace;
      --radius: 4px;
      --shadow: 0 8px 32px rgba(0,0,0,0.7);
      --glow:   0 0 20px rgba(245,200,66,0.3);
    }
    html, body {
      width: 100vw; height: 100vh;
      background: transparent;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'Inter', sans-serif;
    }

    /* ── Floating widget ──────────────────────────────────── */
    #companion-widget {
      position: fixed;
      /* Default position — overridden by JS from localStorage */
      right: 28px;
      bottom: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 10;
      cursor: grab;
    }
    #companion-widget.dragging { cursor: grabbing; }

    .cat-stage {
      filter: drop-shadow(0 4px 12px rgba(245,200,66,0.35));
      transition: filter 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    .cat-stage:hover { filter: drop-shadow(0 4px 24px rgba(245,200,66,0.6)); }

    #cat-canvas {
      cursor: pointer;
      animation: catFloat 4s ease-in-out infinite;
      image-rendering: pixelated;
    }
    @keyframes catFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }

    #cat-mood {
      font-family: var(--pixel);
      font-size: 0.35rem;
      color: var(--text2);
      background: rgba(10,10,15,0.88);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3px 7px;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    .widget-btns { display: flex; gap: 4px; }
    .widget-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: var(--radius);
      padding: 3px 7px;
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1;
    }
    .widget-btn:hover, .widget-btn.active {
      border-color: var(--accent); color: var(--accent); box-shadow: var(--glow);
    }

    /* ── Settings panel — positioned dynamically via JS ──── */
    #settings-panel {
      position: fixed;
      width: 284px;
      background: rgba(18,18,26,0.97);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      z-index: 11;
      transform: scale(0.95);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    #settings-panel.open {
      transform: scale(1);
      opacity: 1;
      pointer-events: all;
    }

    .panel-section { margin-bottom: 1.1rem; }
    .panel-section:last-child { margin-bottom: 0; }
    .panel-section h3 {
      font-family: var(--pixel);
      font-size: 0.38rem;
      color: var(--accent);
      margin-bottom: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .section-divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

    #animal-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
    .animal-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 6px 4px; background: var(--bg3);
      border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: all 0.18s;
    }
    .animal-btn:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--glow); }
    .animal-btn.active { border-color: var(--accent); background: rgba(245,200,66,0.12); box-shadow: 0 0 0 2px var(--accent),var(--glow); }
    .animal-emoji { font-size: 1.2rem; line-height: 1; }
    .animal-label { font-family: var(--pixel); font-size: 0.28rem; color: var(--text2); letter-spacing: 0.04em; }
    .animal-btn.active .animal-label { color: var(--accent); }

    #color-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
    .color-swatch {
      width: 100%; aspect-ratio: 1; border-radius: 4px;
      border: 2px solid transparent; cursor: pointer; transition: all 0.18s;
    }
    .color-swatch:hover { transform: scale(1.1); border-color: var(--text); }
    .color-swatch.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent),var(--glow); }

    #pattern-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; }
    .pattern-btn {
      font-family: var(--pixel); font-size: 0.35rem; padding: 6px 4px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); border-radius: var(--radius);
      cursor: pointer; transition: all 0.18s; letter-spacing: 0.05em;
    }
    .pattern-btn:hover { border-color: var(--accent); color: var(--accent); }
    .pattern-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(245,200,66,0.1); }

    .sparkle {
      position: fixed; font-size: 1rem; pointer-events: none; z-index: 999;
      animation: sparkleAnim 1s ease forwards;
    }
    @keyframes sparkleAnim {
      0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity:1; }
      100% { transform: translate(var(--dx),var(--dy)) scale(0) rotate(180deg); opacity:0; }
    }
  </style>
</head>
<body>

  <div id="companion-widget">
    <div class="cat-stage">
      <canvas id="cat-canvas" aria-hidden="true"></canvas>
    </div>
    <div id="cat-mood">😊 Content</div>
    <div class="widget-btns">
      <button class="widget-btn" id="settings-btn" title="Customize">⚙️</button>
      <button class="widget-btn" id="ctx-btn" title="Options">⋯</button>
    </div>
  </div>

  <aside id="settings-panel">
    <div class="panel-section">
      <h3>Animal</h3>
      <div id="animal-grid"></div>
    </div>
    <hr class="section-divider" />
    <div class="panel-section">
      <h3>Color</h3>
      <div id="color-grid"></div>
    </div>
    <hr class="section-divider" />
    <div class="panel-section">
      <h3>Pattern</h3>
      <div id="pattern-grid"></div>
    </div>
  </aside>

  <script src="cat.js"></script>
  <script src="behaviors.js"></script>
  <script src="customizer.js"></script>
  <script>
  'use strict';

  document.addEventListener('DOMContentLoaded', () => {

    // ── Renderer + behaviour ──────────────────────────────
    const canvas     = document.getElementById('cat-canvas');
    const cat        = new CatRenderer(canvas);
    const behavior   = new BehaviorEngine(cat);
    const customizer = new CatCustomizer(cat);

    // Mood label
    const moodEl = document.getElementById('cat-mood');
    const MOODS = {
      idle:'😊 Content', typing:'😤 Focused', excited:'🤩 Hyper!',
      sleeping:'😴 Sleepy', stretching:'🧘 Stretching', celebrating:'🎉 Happy!',
      napping:'💤 Napping', scroll_up:'👆 Curious', scroll_down:'👇 Curious',
      swipe:'🐾 Playful',
    };
    setInterval(() => { moodEl.textContent = MOODS[behavior.state] || '😊 Content'; }, 500);

    // ── Drag — moves widget within the full-screen window ─
    const widget = document.getElementById('companion-widget');
    let isDragging = false, dragStartX, dragStartY, widgetStartX, widgetStartY;

    // Load saved position from localStorage
    function loadPosition() {
      try {
        const pos = JSON.parse(localStorage.getItem('companion-pos') || 'null');
        if (pos && typeof pos.left === 'number' && typeof pos.top === 'number') {
          // Clamp to viewport
          const maxX = window.innerWidth  - widget.offsetWidth  - 8;
          const maxY = window.innerHeight - widget.offsetHeight - 8;
          widget.style.right  = 'auto';
          widget.style.bottom = 'auto';
          widget.style.left   = Math.max(8, Math.min(maxX, pos.left)) + 'px';
          widget.style.top    = Math.max(8, Math.min(maxY, pos.top))  + 'px';
        }
      } catch(e) {}
    }

    function savePosition() {
      const rect = widget.getBoundingClientRect();
      localStorage.setItem('companion-pos', JSON.stringify({ left: rect.left, top: rect.top }));
    }

    function getWidgetLeft()  { return widget.getBoundingClientRect().left; }
    function getWidgetTop()   { return widget.getBoundingClientRect().top;  }

    // Mousedown on widget (but not buttons/canvas)
    widget.addEventListener('mousedown', (e) => {
      if (e.target.closest('button') || e.target === canvas) return;
      if (e.button !== 0) return;
      isDragging = true;
      dragStartX   = e.clientX;
      dragStartY   = e.clientY;
      widgetStartX = getWidgetLeft();
      widgetStartY = getWidgetTop();
      widget.classList.add('dragging');
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      const newX = widgetStartX + dx;
      const newY = widgetStartY + dy;
      const maxX = window.innerWidth  - widget.offsetWidth  - 4;
      const maxY = window.innerHeight - widget.offsetHeight - 4;
      widget.style.right  = 'auto';
      widget.style.bottom = 'auto';
      widget.style.left   = Math.max(4, Math.min(maxX, newX)) + 'px';
      widget.style.top    = Math.max(4, Math.min(maxY, newY)) + 'px';
      // Reposition settings panel while dragging
      if (panel.classList.contains('open')) positionPanel();
    });

    document.addEventListener('mouseup', () => {
      if (isDragging) { isDragging = false; widget.classList.remove('dragging'); savePosition(); }
    });

    // Load saved position after first render so offsetWidth/Height are available
    requestAnimationFrame(() => requestAnimationFrame(loadPosition));

    // ── Settings panel ────────────────────────────────────
    const panel       = document.getElementById('settings-panel');
    const settingsBtn = document.getElementById('settings-btn');

    function positionPanel() {
      const rect  = widget.getBoundingClientRect();
      const panelW = 284, panelH = 420;
      const margin = 8;

      // Prefer opening above the widget
      let left = rect.right - panelW;
      let top  = rect.top   - panelH - margin;

      // Flip below if not enough room above
      if (top < margin) top = rect.bottom + margin;
      // Keep within horizontal bounds
      if (left < margin) left = margin;
      if (left + panelW > window.innerWidth - margin) left = window.innerWidth - panelW - margin;
      // Keep within vertical bounds
      if (top + panelH > window.innerHeight - margin) top = window.innerHeight - panelH - margin;

      panel.style.left = left + 'px';
      panel.style.top  = top  + 'px';
    }

    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const open = panel.classList.toggle('open');
      settingsBtn.classList.toggle('active', open);
      if (open) positionPanel();
    });

    document.addEventListener('click', (e) => {
      if (!panel.contains(e.target) && !settingsBtn.contains(e.target)) {
        panel.classList.remove('open');
        settingsBtn.classList.remove('active');
      }
    });

    // ── Right-click / options button ──────────────────────
    const ctxBtn = document.getElementById('ctx-btn');
    ctxBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (window.electronAPI) window.electronAPI.showContextMenu();
    });
    canvas.addEventListener('contextmenu', () => {
      if (window.electronAPI) window.electronAPI.showContextMenu();
    });

    // ── Click sparkles ────────────────────────────────────
    canvas.addEventListener('click', (e) => {
      behavior.triggerCelebrate();
      const r = canvas.getBoundingClientRect();
      spawnSparkles(r.left + r.width/2, r.top + r.height/2);
    });

    function spawnSparkles(x, y) {
      const emojis = ['✨','⭐','🐾','💫','🌟'];
      for (let i = 0; i < 6; i++) {
        const el = document.createElement('div');
        el.className = 'sparkle';
        el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        el.style.cssText = `left:${x}px;top:${y}px;--dx:${(Math.random()-0.5)*80}px;--dy:${-Math.random()*80-20}px`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
      }
    }

    // ── Click-through: transparent areas pass clicks through ──
    // Only active when running inside Electron
    if (window.electronAPI) {
      document.addEventListener('mousemove', (e) => {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const overWidget = el && el !== document.documentElement && el !== document.body;
        window.electronAPI.setIgnoreMouseEvents(!overWidget, { forward: true });
      });
    }
  });
  </script>
</body>
</html>
